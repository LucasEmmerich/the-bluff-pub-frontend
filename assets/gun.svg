<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="none">
  <g transform="scale(-1,1) translate(-200,0)">
    <!-- Barrel -->
    <rect x="68" y="23" width="124" height="16" rx="4" fill="#9B8260"/>
    <rect x="71" y="24" width="118" height="5" rx="2" fill="#C0A07A" opacity="0.5"/>
    <rect x="186" y="20" width="7" height="22" rx="2" fill="#7A6040"/>
    <!-- Front sight -->
    <rect x="183" y="17" width="5" height="7" rx="1.5" fill="#604828"/>

    <!-- Cylinder (revolver drum) -->
    <ellipse cx="76" cy="35" rx="21" ry="16" fill="#8A7252" stroke="#5C4228" stroke-width="2"/>
    <ellipse cx="76" cy="30" rx="14" ry="6" fill="#A88E68" opacity="0.3"/>
    <!-- Cylinder holes -->
    <circle cx="76" cy="22" r="3.5" fill="#1E1008"/>
    <circle cx="86" cy="27" r="3.5" fill="#1E1008"/>
    <circle cx="89" cy="37" r="3.5" fill="#1E1008"/>
    <circle cx="82" cy="47" r="3.5" fill="#1E1008"/>
    <circle cx="70" cy="49" r="3.5" fill="#1E1008"/>
    <circle cx="62" cy="42" r="3.5" fill="#1E1008"/>
    <circle cx="62" cy="31" r="3.5" fill="#1E1008"/>

    <!-- Frame body -->
    <path d="M56 33 L68 23 L68 39 L85 51 L85 57 L52 57 Z" fill="#9B8260"/>
    <path d="M56 33 L68 27 L68 32 Z" fill="#B09A78" opacity="0.4"/>

    <!-- Hammer -->
    <path d="M44 20 L56 20 L56 36 L44 36 Q38 32 38 28 Q38 20 44 20 Z" fill="#8A7252" stroke="#5C4228" stroke-width="1.5"/>
    <rect x="35" y="15" width="15" height="9" rx="3" fill="#7A6242" stroke="#5C4228" stroke-width="1"/>

    <!-- Grip -->
    <path d="M52 55 Q50 68 48 80 Q47 89 54 90 L67 90 Q75 87 75 79 L75 55 Z" fill="#7B4520" stroke="#542E0E" stroke-width="2"/>
    <!-- Wood grain -->
    <line x1="53" y1="59" x2="72" y2="59" stroke="#50280A" stroke-width="1.3" opacity="0.4"/>
    <line x1="52" y1="65" x2="72" y2="65" stroke="#50280A" stroke-width="1.3" opacity="0.4"/>
    <line x1="51" y1="71" x2="71" y2="71" stroke="#50280A" stroke-width="1.3" opacity="0.4"/>
    <line x1="50" y1="77" x2="70" y2="77" stroke="#50280A" stroke-width="1.3" opacity="0.4"/>
    <line x1="49" y1="83" x2="67" y2="83" stroke="#50280A" stroke-width="1.3" opacity="0.4"/>

    <!-- Trigger guard -->
    <path d="M62 57 Q64 73 74 75 L83 75 Q89 70 89 57 Z" fill="none" stroke="#5C4228" stroke-width="2.5"/>
    <!-- Trigger -->
    <path d="M76 57 L73 71" stroke="#5C4228" stroke-width="3" stroke-linecap="round"/>

    <!-- Rear sight -->
    <rect x="53" y="20" width="6" height="5" rx="1.5" fill="#604828"/>

    <!-- Barrel underside detail -->
    <rect x="72" y="36" width="114" height="4" rx="1" fill="#7A6040" opacity="0.4"/>
  </g>
</svg>
